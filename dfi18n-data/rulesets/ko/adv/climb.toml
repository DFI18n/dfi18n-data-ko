base = "adv::climb"

[[rulesets]]
[rulesets.rules]
"Climb to {place}{direction}" = "{place}{direction}(으)로 기어오르기"

[[rulesets]]
name = "place"
[rulesets.rules]
"{::tiles}" = "{::tiles}"

[[rulesets]]
name = "direction"
optional = true
[rulesets.rules]
" ({direction::^0}{direction::main}{direction::$0}{direction::$1})" = " ({direction::^0}{direction::main}{direction::$0}{direction::$1})"

[[rulesets]]
name = "direction::main"
[rulesets.rules]
" holding {NS}{EW}" = ", {NS}{EW} 잡기"
" releasing hold" = ", 잡기 해제"

[[rulesets]]
name = "direction::^0"
[rulesets.rules]
"{height}" = "{height}"
"{NS}{EW}" = "{NS}{EW}"

[[rulesets]]
name = "direction::$0"
optional = true
[rulesets.rules]
"/{height}" = "/{height}"

[[rulesets]]
name = "direction::$1"
optional = true
[rulesets.rules]
"/Air" = "/대기"

[[rulesets]]
name = "tit"
optional = true
[rulesets.rules]
"/" = "/"

[[rulesets]]
name = "height"
optional = true
[rulesets.rules]
"Above" = "위쪽"
"Below" = "아래쪽"

[[rulesets]]
name = "EW"
optional = true
[rulesets.rules]
"E" = "동"
"W" = "서"
"East" = "동쪽"
"West" = "서쪽"

[[rulesets]]
name = "NS"
optional = true
[rulesets.rules]
"N" = "북"
"S" = "남"
"North" = "북쪽"
"South" = "남쪽"