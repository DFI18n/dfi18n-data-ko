base = "psychology::memory"

[[rulesets]]
[rulesets.rules]
"{main}" = "{main}"

[[rulesets]]
name = "main"
[rulesets.rules]
# 어순 변경: [사건] [기억 행동] [감정+조사] 느낌
# 일반 공백 사용
"{mind}{memorycolor}dwelling upon{textcolor} {things}{tail}" = "{things} {memorycolor}기억을 곱씹으며 {mind}{textcolor} 느낌{tail}"
"{mind}{memorycolor}remembering{textcolor} {things}{tail}" = "{things} {memorycolor}기억을 떠올리며 {mind}{textcolor} 느낌{tail}"
"{mind}{memorycolor}reliving{textcolor} {things}{tail}" = "{things} {memorycolor}기억을 생생히 되살리며 {mind}{textcolor} 느낌{tail}"
# 날짜 표시
"{mind::color}{season} {%number}" = "{mind::color}{%number}년 {season}"

[[rulesets]]
name = "things"
[rulesets.rules]
"{::psychology::event}" = "{::psychology::event}"

[[rulesets]]
name = "mind"
[rulesets.rules]
"{mind::color}{mind::text}" = "{mind::color}{mind::text}"

[[rulesets]]
name = "mind::color"
optional = true
[rulesets.rules]
"[C:2:0:1]" = "[C:2:0:1]"
"[C:2:0:0]" = "[C:2:0:0]"
"[C:4:0:1]" = "[C:4:0:1]"
"[C:4:0:0]" = "[C:4:0:0]"
"[C:7:0:1]" = "[C:7:0:1]"
"[C:7:0:0]" = "[C:7:0:0]"
"[C:3:0:1]" = "[C:3:0:1]"
"[C:3:0:0]" = "[C:3:0:0]"
"[C:1:0:1]" = "[C:1:0:1]"
"[C:6:0:1]" = "[C:6:0:1]"
"[C:6:0:0]" = "[C:6:0:0]"
"[C:5:0:1]" = "[C:5:0:1]"
"[C:5:0:0]" = "[C:5:0:0]"

