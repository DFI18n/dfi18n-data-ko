base = "psychology::needs"

[[rulesets]]
[rulesets.rules]
"{main}" = "{main}"

[[rulesets]]
name = "main"
[rulesets.rules]
# 어순: 전반적으로 [성별] [상태].
"{textcolor}Overall,{sex}{kind}{things}{tail}" = "{textcolor}전반적으로 {sex}{things}{tail}"
"{textcolor}{sex}{things}{tail}" = "{textcolor}{sex}{things}{tail}"

[[rulesets]]
name = "things"
[rulesets.rules]
" very focused with satisfied needs" = "욕구가 충족되어 매우 집중한 상태임"
" quite focused with satisfied needs" = "욕구가 충족되어 꽤 집중한 상태임"
" somewhat focused with satisfied needs" = "욕구가 충족되어 어느 정도 집중한 상태임"
" badly distracted by unmet needs" = "충족되지 않은 욕구 때문에 심하게 산만함"
" distracted by unmet needs" = "충족되지 않은 욕구 때문에 산만함"
" unfocused by unmet needs" = "충족되지 않은 욕구 때문에 집중하지 못함"
" untroubled by unmet needs" = "충족되지 않은 욕구에도 별로 개의치 않음"
" is unfettered {things::after}" = "{things::after} 얽매임이 없음"
" is level-headed {things::after}" = "{things::after} 차분함"
" is untroubled {things::after}" = "{things::after} 평온함"
" is not distracted {things::after}" = "{things::after} 방해받지 않음"
" is unfocused {things::after}" = "{things::after} 집중하지 못함"
" is distracted {things::after}" = "{things::after} 산만함"
" is badly distracted {things::after}" = "{things::after} 심하게 산만함"

