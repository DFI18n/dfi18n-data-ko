"after being away from animals" = "동물을 보지 못해"
"after seeing a great beast" = "거대 짐승을 본 후"
"after being away from great beasts" = "거대 짐승을 보지 못해"
"after acquiring something" = "무언가를 획득한 후"
"after being unable to acquire something" = "무언가를 획득하지 못해"
"after eating a good meal" = "맛있는 식사를 한 후"
"after a lack of decent meals" = "제대로 된 식사를 하지 못해"
"after fighting" = "싸움을 한 후"
"after being unable to fight" = "싸움을 하지 못해"
"after causing trouble" = "소란을 피운 후"
