[[rulesets]]
name = "sex"
[rulesets.rules]
" he" = "그는 "
" she" = "그녀는 "
"He" = "그는 "
"She" = "그녀는 "

[[rulesets]]
name = "kind"
[rulesets.rules]
# 한국어에서는 형용사/동사가 문장 끝에 오므로 'is'는 번역하지 않고 생략합니다.
" is" = ""

[[rulesets]]
name = "textcolor"
[rulesets.rules]
"[C:7:0:1]" = "[C:7:0:1]"
"[C:7:0:0]" = "[C:7:0:0]"
"[C:2:0:1]" = "[C:2:0:1]"
"[C:2:0:0]" = "[C:2:0:0]"
"[C:6:0:1]" = "[C:6:0:1]"
"[C:6:0:0]" = "[C:6:0:0]"

[[rulesets]]
name = "tail"
optional = true
[rulesets.rules]
"." = "."